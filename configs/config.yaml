# ==============================================================================
# GeoQuant: Geometric & Topological Embedding Analysis in MobileNetV3
# Fuente única de verdad de parámetros — ver experiment/ y quantization/ para overrides
# ==============================================================================

seed: 42

data:
  raw_dir: "data/raw/cub200"
  processed_dir: "data/processed"
  dataset: "cub200"
  num_classes: 200
  image_size: 224
  batch_size: 32
  num_workers: 4
  pin_memory: true

model:
  backbone: "mobilenet_v3_small"
  pretrained: true
  embedding_size: 576        # salida de avgpool en MobileNetV3-Small
  pooling: "avg"

  arcface:
    margin: 0.5
    scale: 30.0

training:
  epochs: 30
  lr: 0.01
  momentum: 0.9
  weight_decay: 5.0e-4
  scheduler: "cosine"
  label_smoothing: 0.1
  checkpoint_dir: "outputs/checkpoints"

eval:
  device: "cpu"
  quantized_backend: "fbgemm"
  output_dir: "outputs/results"
  report_formats: ["json", "csv"]
